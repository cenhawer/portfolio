<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Publisher box -->
  <rect x="5" y="38" width="26" height="18" rx="3" fill="#4338CA" stroke="#818CF8" stroke-width="1.5"/>
  <text x="18" y="51" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#E0E7FF">PUB</text>
  <!-- Event bus / stream line -->
  <line x1="31" y1="47" x2="69" y2="47" stroke="#A78BFA" stroke-width="2.5"/>
  <!-- Lightning bolt on bus -->
  <polygon points="48,38 44,50 50,50 46,62 54,48 48,48 52,38" fill="#FBBF24"/>
  <!-- Subscriber boxes -->
  <rect x="69" y="20" width="26" height="16" rx="3" fill="#1D4ED8" stroke="#93C5FD" stroke-width="1.5"/>
  <text x="82" y="32" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#E0E7FF">SUB 1</text>
  <rect x="69" y="40" width="26" height="16" rx="3" fill="#1D4ED8" stroke="#93C5FD" stroke-width="1.5"/>
  <text x="82" y="52" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#E0E7FF">SUB 2</text>
  <rect x="69" y="60" width="26" height="16" rx="3" fill="#1D4ED8" stroke="#93C5FD" stroke-width="1.5"/>
  <text x="82" y="72" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#E0E7FF">SUB 3</text>
  <!-- Lines from bus to subs -->
  <line x1="69" y1="47" x2="69" y2="28" stroke="#93C5FD" stroke-width="1.5"/>
  <line x1="69" y1="47" x2="69" y2="48" stroke="#93C5FD" stroke-width="1.5"/>
  <line x1="69" y1="47" x2="69" y2="68" stroke="#93C5FD" stroke-width="1.5"/>
</svg>
