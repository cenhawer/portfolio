<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Command bus (write) - left arrow going down -->
  <rect x="12" y="20" width="32" height="20" rx="4" fill="#4338CA" stroke="#818CF8" stroke-width="1.5"/>
  <text x="28" y="34" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#E0E7FF">CMD</text>
  <line x1="28" y1="40" x2="28" y2="56" stroke="#818CF8" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="12" y="56" width="32" height="20" rx="4" fill="#3730A3" stroke="#818CF8" stroke-width="1.5"/>
  <text x="28" y="70" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="bold" fill="#E0E7FF">WRITE</text>
  <!-- Query bus (read) - right arrow going down -->
  <rect x="56" y="20" width="32" height="20" rx="4" fill="#1D4ED8" stroke="#93C5FD" stroke-width="1.5"/>
  <text x="72" y="34" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#E0E7FF">QRY</text>
  <line x1="72" y1="40" x2="72" y2="56" stroke="#93C5FD" stroke-width="2" marker-end="url(#arr2)"/>
  <rect x="56" y="56" width="32" height="20" rx="4" fill="#1E40AF" stroke="#93C5FD" stroke-width="1.5"/>
  <text x="72" y="70" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="bold" fill="#E0E7FF">READ</text>
  <!-- Divider -->
  <line x1="50" y1="15" x2="50" y2="82" stroke="#6366F1" stroke-width="1.5" stroke-dasharray="4,3"/>
  <defs>
    <marker id="arr" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#818CF8"/>
    </marker>
    <marker id="arr2" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#93C5FD"/>
    </marker>
  </defs>
</svg>
